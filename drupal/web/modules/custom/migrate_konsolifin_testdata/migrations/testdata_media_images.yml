id: testdata_media_images
label: Import test fixture media images
migration_tags:
  - KonsoliFIN Testdata
  - testdata
migration_group: testdata
source:
  plugin: json_fixture
  file: media/images.json
  ids:
    id:
      type: integer
process:
  name: filename
  mid: id
  field_media_image/target_id: id
  field_media_image/alt: thumbnail__alt
  uid:
    -
      plugin: default_value
      default_value: 8
  uuid: uuid
destination:
  plugin: entity:media
  default_bundle: image
migration_dependencies:
  required:
    - testdata_files
