id: testdata_taxonomy_sarja
label: Import test fixture sarja terms
migration_tags:
  - KonsoliFIN Testdata
  - testdata
migration_group: testdata
source:
  plugin: json_fixture
  file: taxonomy/sarja.json
  ids:
    id:
      type: integer
process:
  vid:
    plugin: default_value
    default_value: sarja
  name: name
  description/value: description
  description/format:
    plugin: default_value
    default_value: basic_html
  weight: weight
destination:
  plugin: entity:taxonomy_term
migration_dependencies:
  required:
    - testdata_media_images
