id: testdata_taxonomy_pelit
label: Import test fixture game terms
migration_tags:
  - KonsoliFIN Testdata
  - testdata
migration_group: testdata
source:
  plugin: json_fixture
  file: taxonomy/peli.json
  ids:
    tid:
      type: integer
process:
  tid: tid
  vid:
    plugin: default_value
    default_value: peli
  name: title
  description/value: body
  description/format:
    plugin: default_value
    default_value: full_html
  field_www_sivu/uri: www_sivu
  field_hero_kuva: hero_image_id
  field_kuuluu_pelisarjaan: in_franchise
destination:
  plugin: entity:taxonomy_term
migration_dependencies:
  required:
    - testdata_media_images
    - testdata_taxonomy_franchise
