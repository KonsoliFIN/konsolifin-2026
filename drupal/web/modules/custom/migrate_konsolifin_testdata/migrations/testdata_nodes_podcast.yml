id: testdata_nodes_podcast
label: Import test fixture podcast nodes
migration_tags:
  - KonsoliFIN Testdata
  - testdata
migration_group: testdata
source:
  plugin: json_fixture
  file: nodes/podcast.json
  ids:
    id:
      type: integer
process:
  title: title
  body/value: body
  body/format:
    plugin: default_value
    default_value: full_html
  uid:
    plugin: default_value
    default_value: 6
  status: status
  created:
    plugin: callback
    callable: strtotime
    source: created
  field_mp3:
    plugin: default_value
    default_value: 101
  field_osallistujat:
    plugin: default_value
    default_value: [2,3]
  field_ihmiset: ihmiset_ids
  field_pelit: pelit_ids
destination:
  plugin: 'entity_complete:node'
  default_bundle: podcast
migration_dependencies:
  required:
    - testdata_users
    - testdata_media_images
    - testdata_media_audio
    - testdata_taxonomy_alustat
    - testdata_taxonomy_ihmiset
    - testdata_taxonomy_pelit
    - testdata_taxonomy_sarja
