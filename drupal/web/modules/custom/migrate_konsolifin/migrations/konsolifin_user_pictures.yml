id: konsolifin_user_pictures
label: Migrate user profile pictures
migration_tags:
  - KonsoliFIN
migration_group: migrate_konsolifin
source:
  plugin: d7_user
  condition:
    plugin: callback
    callable: is_numeric
    source: field_nostokuva
process:
  uid: uid
  name: name
  field_kuva/target_id:
    -
      plugin: migration_lookup
      migration: konsolifin_media_images
      source: field_nostokuva/0/fid
      no_stub: true
    -
      plugin: skip_on_empty
      method: process
destination:
  plugin: entity:user
  overwrite_properties:
    - field_kuva
migration_dependencies:
  required:
    - konsolifin_users
