id: konsolifin_nodes_peliarvostelu
label: 'Node complete (Arvostelu)'
migration_tags:
  - KonsoliFIN
migration_group: migrate_konsolifin
source:
  plugin: d7_node_complete
  node_type: arvostelu
process:
  skip_if_media_arvio:
    - plugin: get
      source: field_arvosteltu_versio/0/tid
    - plugin: skip_on_value
      value: 11063
      method: row
      message: 'Skipping node because it is tagged with term 11063.'
  nid:
    -
      plugin: get
      source: tnid
  vid:
    -
      plugin: get
      source: vid
  title:
    -
      plugin: get
      source: title
  uid:
    -
      plugin: get
      source: node_uid
  status:
    -
      plugin: get
      source: status
  created:
    -
      plugin: get
      source: created
  changed:
    -
      plugin: get
      source: timestamp
  promote:
    -
      plugin: get
      source: promote
  sticky:
    -
      plugin: get
      source: sticky
  revision_uid:
    -
      plugin: get
      source: revision_uid
  revision_log:
    -
      plugin: get
      source: log
  revision_timestamp:
    -
      plugin: get
      source: timestamp
  body:
    -
      plugin: sub_process
      source: body
      process:
        value:
          -
            plugin: media_wysiwyg_to_embed
            source: value
            media_migration:
              - konsolifin_media_images
              - konsolifin_media_video
        summary:
          plugin: get
          source: summary
        format:
          plugin: static_map
          source: format
          map:
            filtered_html: basic_html
          bypass: true
  field_arvosteltu_versio:
    -
      plugin: sub_process
      source: field_arvosteltu_versio
      process:
        target_id: tid
  field_lisatiedot:
    -
      plugin: callback
      callable: strip_tags
      source: field_lisatiedot/0/value
  field_hero:
    -
      plugin: migration_lookup
      migration: konsolifin_media_images
      source: field_nostokuva/0/fid
      no_stub: true
    -
      plugin: skip_on_empty
      method: process
  field_nostotyyppi:
    -
      plugin: get
      source: field_nostotyyppi
  field_pelit:
    -
      plugin: sub_process
      source: field_pelit
      process:
        target_id: tid
  field_arvosana:
    -
      plugin: callback
      source: field_score/0/review_score
      callable: '\Drupal\migrate_konsolifin\Utility\MigrateMath::add25'
    -
      plugin: callback
      callable: '\Drupal\migrate_konsolifin\Utility\MigrateMath::multiplyBy32'
  field_kuvat:
    -
      plugin: sub_process
      source: field_kuvitus
      process:
        target_id:
          plugin: migration_lookup
          migration: konsolifin_media_images
          source: fid
          no_stub: true
  field_video:
    -
      plugin: get
      source: field_video
  field_sarja:
    -
      plugin: sub_process
      source: field_sarja
      process:
        target_id: tid
  field_alustatarkenne:
    -
      plugin: sub_process
      source: field_alustatarkenne
      process:
        target_id: tid
  field_pelin_nimi:
    -
      plugin: get
      source: field_pelin_nimi
  field_title_english:
    -
      plugin: get
      source: field_title_english
  field_summary_in_english:
    -
      plugin: get
      source: field_summary_in_english
destination:
  plugin: 'entity_complete:node'
  translations: true
  default_bundle: peliarvostelu
