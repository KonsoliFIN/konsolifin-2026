konsolifin.legacy_forum_domain:
  path: '/forum.konsolifin.net'
  defaults:
    _controller: '\Drupal\konsolifin_misc\Controller\KonsolifinController::legacyForumRedirect'
  requirements:
    _access: 'TRUE'
