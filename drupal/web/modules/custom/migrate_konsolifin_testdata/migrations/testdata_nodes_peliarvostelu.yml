id: testdata_nodes_peliarvostelu
label: Import test fixture peliarvostelu nodes
migration_tags:
  - KonsoliFIN Testdata
  - testdata
migration_group: testdata
source:
  plugin: json_fixture
  file: nodes/peliarvostelu.json
  ids:
    nid:
      type: integer
process:
  nid: nid
  type:
    plugin: default_value
    default_value: peliarvostelu
  title: title
  body/value: body
  body/summary: summary
  body/format:
    plugin: default_value
    default_value: full_html
  uid: uid
  status: status
  promote: promote
  created: created
  field_hero:
    -
      plugin: migration_lookup
      migration: testdata_media_images
      source: hero_image_id
      no_stub: true
    -
      plugin: skip_on_empty
      method: process
  field_arvosana: arvosana
  field_arvosteltu_versio:
    plugin: migration_lookup
    migration: testdata_taxonomy_alustat
    source: arvosteltu_versio_ids
    no_stub: true
  field_pelin_nimi: pelin_nimi
  field_title_english: title_english
  field_summary_in_english: summary_in_english
  field_alustat:
    plugin: migration_lookup
    migration: testdata_taxonomy_alustat
    source: alustat_ids
    no_stub: true
  field_pelit:
    plugin: migration_lookup
    migration: testdata_taxonomy_pelit
    source: pelit_ids
    no_stub: true
  field_ihmiset:
    plugin: migration_lookup
    migration: testdata_taxonomy_ihmiset
    source: ihmiset_ids
    no_stub: true
  field_julkaisijat:
    plugin: migration_lookup
    migration: testdata_taxonomy_pelijulkaisijat
    source: julkaisijat_ids
    no_stub: true
  field_studiot:
    plugin: migration_lookup
    migration: testdata_taxonomy_pelistudiot
    source: studiot_ids
    no_stub: true
  field_sarja:
    plugin: migration_lookup
    migration: testdata_taxonomy_sarja
    source: sarja_ids
    no_stub: true
  field_kuvat:
    plugin: migration_lookup
    migration: testdata_media_images
    source: kuvat_ids
    no_stub: true
destination:
  plugin: entity:node
migration_dependencies:
  required:
    - testdata_users
    - testdata_media_images
    - testdata_taxonomy_alustat
    - testdata_taxonomy_alustatarkenne
    - testdata_taxonomy_ihmiset
    - testdata_taxonomy_pelistudiot
    - testdata_taxonomy_pelijulkaisijat
    - testdata_taxonomy_pelit
    - testdata_taxonomy_sarja
    - testdata_taxonomy_franchise
