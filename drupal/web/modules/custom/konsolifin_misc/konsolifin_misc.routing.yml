    _access: 'TRUE'

konsolifin.legacy_redirect_arviolista:
  path: '/arviolista.php'
  defaults:
    _controller: '\Drupal\konsolifin_misc\Controller\KonsolifinController::legacyRedirect'
  requirements:
    _access: 'TRUE'

konsolifin.legacy_redirect_getstatistics:
  path: '/priv.dog.settings/GetStatistics'
