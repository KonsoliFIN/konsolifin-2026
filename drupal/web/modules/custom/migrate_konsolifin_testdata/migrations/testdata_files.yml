id: testdata_files
label: Import test fixture files
migration_tags:
  - KonsoliFIN Testdata
  - testdata
migration_group: testdata
source:
  plugin: json_fixture
  file: media/images.json
  ids:
    id:
      type: integer
  constants:
    source_base_path: data/images/
    file_dest: 'public://testdata/'
process:
  source_full_path:
    plugin: concat
    delimiter: ''
    source:
      - constants/source_base_path
      - filename
  destination_full_path:
    plugin: concat
    delimiter: ''
    source:
      - constants/file_dest
      - filename
  uri:
    -
      plugin: file_copy
      source:
        - '@source_full_path'
        - '@destination_full_path'
      file_exists: replace
    -
      plugin: skip_on_empty
      method: row
      message: 'Source image file not found, skipping row.'
  filename: filename
  uid:
    -
      plugin: migration_lookup
      migration: testdata_users
      source: uid
      no_stub: true
    -
      plugin: skip_on_empty
      method: process
      message: 'No user found for this file entity.'
destination:
  plugin: entity:file
migration_dependencies:
  required:
    - testdata_users
