id: testdata_media_images
label: Import test fixture media images
migration_tags:
  - KonsoliFIN Testdata
  - testdata
migration_group: testdata
source:
  plugin: json_fixture
  file: media/images.json
  ids:
    id:
      type: integer
process:
  name: filename
  mid: id
  field_media_image/target_id:
    -
      plugin: migration_lookup
      migration: testdata_files
      source: id
      no_stub: true
    -
      plugin: skip_on_empty
      method: row
      message: 'Image file not found for media entity, skipping row.'
  field_media_image/alt: alt
  uid:
    -
      plugin: migration_lookup
      migration: testdata_users
      source: uid
      no_stub: true
    -
      plugin: skip_on_empty
      method: process
      message: 'No user found for this media entity.'
destination:
  plugin: entity:media
  default_bundle: image
migration_dependencies:
  required:
    - testdata_users
    - testdata_files
