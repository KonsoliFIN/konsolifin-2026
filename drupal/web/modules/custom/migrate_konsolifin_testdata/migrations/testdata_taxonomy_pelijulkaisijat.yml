id: testdata_taxonomy_pelijulkaisijat
label: Import test fixture pelijulkaisijat terms
migration_tags:
  - KonsoliFIN Testdata
  - testdata
migration_group: testdata
source:
  plugin: json_fixture
  file: taxonomy/pelijulkaisijat.json
  ids:
    tid:
      type: integer
process:
  tid: tid
  vid:
    plugin: default_value
    default_value: pelijulkaisijat
  name: title
  description/value: body
  description/format:
    plugin: default_value
    default_value: full_html
  field_hero_kuva: hero_image_id
destination:
  plugin: entity:taxonomy_term
migration_dependencies:
  required:
    - testdata_media_images
