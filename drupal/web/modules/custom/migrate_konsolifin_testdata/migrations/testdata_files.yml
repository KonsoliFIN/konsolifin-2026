id: testdata_files
label: Import test fixture files
migration_tags:
  - KonsoliFIN Testdata
  - testdata
migration_group: testdata
source:
  plugin: json_fixture
  file: files/files.json
  ids:
    id:
      type: integer
  constants:
    source_base_path: modules/custom/migrate_konsolifin_testdata/data/files/
    file_dest: 'public://testdata/'
process:
  fid: id
  source_full_path:
    plugin: concat
    delimiter: ''
    source:
      - constants/source_base_path
      - filename
  destination_full_path:
    plugin: concat
    delimiter: ''
    source:
      - constants/file_dest
      - filename
  uri:
    -
      plugin: file_copy
      source:
        - '@source_full_path'
        - '@destination_full_path'
      file_exists: replace
    -
      plugin: skip_on_empty
      method: row
      message: 'Source image file not found, skipping row.'
  filename: filename
  uid:
    -
      plugin: default_value
      default_value: 8
destination:
  plugin: entity:file
