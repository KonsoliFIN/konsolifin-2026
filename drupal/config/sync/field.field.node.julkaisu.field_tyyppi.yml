description: "Mitä nämä tarkoittavat:\r\n<ul>\r\n<li><strong>Early access</strong> Kaikenlaiset betat, early access -julkaisut sun muut, joita pannaan jakoon ennen kuin peli tulee virallisesti jakeluun</li>\r\n<li><strong>Ensijulkaisu</strong> Pelin ensimmäinen tietylle alustalle/tietyille alustoille julkaistava versio. Samasta pelistä on mahdollista ilmestyä useampia ensijulkaisuja, jos esim. peli ilmestyy ensin PC:lle, Playstationille ja Xboxille ja myöhemmin Nintendon konsolille</li>\r\n<li><strong>Remaster</strong> Pelistä tehty virkistetty versio. Edellyttää enemmän muutoksia kuin pelkkä uudelleenjulkaisu uuden sukupolven konsolille. Esim. PS5-versio aikaisemmin PS4:lle julkaistusta pelistä olisi uudelleenjulkaisu, mutta GTA 3 PS5:llä on todennäköisesti remaster, jos ei jopa remake</li>\r\n<li><strong>Remake</strong> Perusteellisempia uudistuksia sisältävä uudelleenjulkaisu kuin mitä remaster. Voi sisältää paranneltuja kontrolleja, muokattua sisältöä tai kokonaan uudistetun pelimoottorin</li>\r\n<li><strong>DLC</strong> Lisäsisältöä, joka edellyttää pääpelin omistamista</li>\r\n<li><strong>Bundle</strong> Peli julkaistaan osana pakettia. Esimerkiksi <i>Mass Effect Legendary Edition</i> on bundle, joka sisältää kolme ensimmäistä Mass Effect -peliä</li>\r\n</ul>"
