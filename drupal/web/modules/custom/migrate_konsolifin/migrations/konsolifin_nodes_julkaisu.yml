id: konsolifin_nodes_julkaisu
label: Migrate release nodes from Drupal 7
migration_tags:
  - KonsoliFIN
migration_group: migrate_konsolifin
source:
  plugin: d7_node_complete
  node_type: julkaisu
process:
  nid:
    -
      plugin: get
      source: tnid
  vid:
    -
      plugin: get
      source: vid
  title:
    -
      plugin: get
      source: title
  uid:
    -
      plugin: get
      source: node_uid
  status:
    -
      plugin: get
      source: status
  created:
    -
      plugin: get
      source: created
  changed:
    -
      plugin: get
      source: timestamp
  promote:
    -
      plugin: get
      source: promote
  sticky:
    -
      plugin: get
      source: sticky
  revision_uid:
    -
      plugin: get
      source: revision_uid
  revision_log:
    -
      plugin: get
      source: log
  revision_timestamp:
    -
      plugin: get
      source: timestamp
  body:
    -
      plugin: get
      source: body
  field_alustat:
    -
      plugin: sub_process
      source: field_alustat
      process:
        target_id: tid
  field_julkaisijat:
    -
      plugin: sub_process
      source: field_julkaisijat
      process:
        target_id: tid
  field_hero:
    -
      plugin: migration_lookup
      migration: konsolifin_media_images
      source: field_nostokuva/0/fid
      no_stub: true
    -
      plugin: skip_on_empty
      method: process
  field_pelit:
    -
      plugin: sub_process
      source: field_pelit
      process:
        target_id: tid
  field_studiot:
    -
      plugin: sub_process
      source: field_studio
      process:
        target_id: tid
  field_kuvat:
    -
      plugin: sub_process
      source: field_kuvitus
      process:
        target_id:
          plugin: migration_lookup
          migration: konsolifin_media_images
          source: fid
          no_stub: true
  field_julkaisuajankohta:
    -
      plugin: sub_process
      source: field_julkaisu_pvm
      process:
        accuracy_level:
          plugin: default_value
          default_value: exact
        stored_date:
          -
            plugin: get
            source: value
destination:
  plugin: 'entity_complete:node'
  translations: true
  default_bundle: julkaisu
