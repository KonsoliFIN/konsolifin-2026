id: konsolifin_taxonomy_alustatarkenne
label: Migrate platform extended info taxonomy terms from Drupal 7
migration_tags:
  - KonsoliFIN
migration_group: migrate_konsolifin
source:
  plugin: d7_taxonomy_term
  bundle: alustatarkenne
process:
  tid: tid
  revision_id: tid
  name: name
  description/value:
    -
      plugin: get
      source: description
  description/format:
    -
      plugin: get
      source: format
  weight: weight
  parent_id:
    -
      plugin: skip_on_empty
      method: process
      source: parent
    -
      plugin: migration_lookup
      migration: konsolifin_taxonomy_alustatarkenne
  parent:
    -
      plugin: default_value
      default_value: 0
      source: '@parent_id'
  changed:
    -
      plugin: get
      source: timestamp
  langcode:
    -
      plugin: get
      source: language
  field_hero_kuva:
    plugin: migration_lookup
    migration: konsolifin_media_images
    source: field_nostokuva/0/fid
  path/alias: url_alias
  path/pathauto:
    plugin: default_value
    default_value: 0
destination:
  plugin: 'entity:taxonomy_term'
  default_bundle: alustatarkenne
