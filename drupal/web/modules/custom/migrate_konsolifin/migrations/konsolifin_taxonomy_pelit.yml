id: konsolifin_taxonomy_pelit
label: Migrate game taxonomy terms from Drupal 7
migration_tags:
  - KonsoliFIN
migration_group: migrate_konsolifin
source:
  plugin: d7_taxonomy_term
  bundle: peli
process:
  tid: tid
  name: name
  description/value:
    -
      plugin: get
      source: description
  description/format:
    -
      plugin: get
      source: format
  field_www_sivu/uri: field_www_sivu/0/value
  field_www_sivu/title: field_www_sivu/0/title
  field_hero_kuva:
    plugin: migration_lookup
    migration: konsolifin_media_images
    source: field_nostokuva/0/fid
  weight: weight
  parent_id:
    -
      plugin: skip_on_empty
      method: process
      source: parent
    -
      plugin: migration_lookup
      migration: konsolifin_taxonomy_pelit
  parent:
    -
      plugin: default_value
      default_value: 0
      source: '@parent_id'
  changed: timestamp
destination:
  plugin: 'entity:taxonomy_term'
  default_bundle: peli
