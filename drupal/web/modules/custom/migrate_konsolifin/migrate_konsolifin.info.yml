type: module
name: Migrating KonsoliFIN content from Drupal 7 site
description: 'Migrates users, files, taxonomy, and content from the Drupal 7 site'
package: KonsoliFIN
core_version_requirement: ^11
dependencies:
  - drupal:migrate
  - drupal:migrate_drupal
  - drupal:migrate_plus
  - drupal:migrate_tools
  - drupal:media
  - drupal:file
  - drupal:image
  - drupal:media_library
  - migrate_file_to_media:migrate_file_to_media
  