id: testdata_media_audio
label: Import test fixture media audio
migration_tags:
  - KonsoliFIN Testdata
  - testdata
migration_group: testdata
source:
  plugin: json_fixture
  file: media/audio.json
  ids:
    id:
      type: integer
process:
  name: filename
  mid: id
  field_media_audio/target_id:
    -
      plugin: migration_lookup
      migration: testdata_files
      source: id
      no_stub: true
    -
      plugin: skip_on_empty
      method: row
      message: 'Audio file not found for media entity, skipping row.'
  field_media_audio/alt: alt
  uid:
    -
      plugin: migration_lookup
      migration: testdata_users
      source: uid
      no_stub: true
    -
      plugin: skip_on_empty
      method: process
      message: 'No user found for this media entity.'
  uuid: uuid
destination:
  plugin: entity:media
  default_bundle: audio
migration_dependencies:
  required:
    - testdata_users
    - testdata_files
