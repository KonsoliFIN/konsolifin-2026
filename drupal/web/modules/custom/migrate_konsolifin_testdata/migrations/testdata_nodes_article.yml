id: testdata_nodes_article
label: Import test fixture article nodes
migration_tags:
  - KonsoliFIN Testdata
  - testdata
migration_group: testdata
source:
  plugin: json_fixture
  file: nodes/article.json
  ids:
    nid:
      type: integer
process:
  nid: nid
  type:
    plugin: default_value
    default_value: article
  title: title
  body/value: body
  body/summary: summary
  body/format:
    plugin: default_value
    default_value: full_html
  uid: uid
  status: status
  created: created
  changed: created
  field_hero: hero_image_id
  field_alustat:
    plugin: migration_lookup
    migration: testdata_taxonomy_alustat
    source: alustat_ids
    no_stub: true
  field_pelit:
    plugin: migration_lookup
    migration: testdata_taxonomy_pelit
    source: pelit_ids
    no_stub: true
  field_ihmiset:
    plugin: migration_lookup
    migration: testdata_taxonomy_ihmiset
    source: ihmiset_ids
    no_stub: true
  field_julkaisijat:
    plugin: migration_lookup
    migration: testdata_taxonomy_pelijulkaisijat
    source: julkaisijat_ids
    no_stub: true
  field_studiot:
    plugin: migration_lookup
    migration: testdata_taxonomy_pelistudiot
    source: studiot_ids
    no_stub: true
  field_sarja:
    plugin: migration_lookup
    migration: testdata_taxonomy_sarja
    source: sarja_ids
    no_stub: true
  field_kuvat:
    plugin: migration_lookup
    migration: testdata_media_images
    source: kuvat_ids
    no_stub: true
destination:
  plugin: entity:node
migration_dependencies:
  required:
    - testdata_users
    - testdata_media_images
    - testdata_taxonomy_alustat
    - testdata_taxonomy_alustatarkenne
    - testdata_taxonomy_ihmiset
    - testdata_taxonomy_pelistudiot
    - testdata_taxonomy_pelijulkaisijat
    - testdata_taxonomy_pelit
    - testdata_taxonomy_sarja
    - testdata_taxonomy_franchise
