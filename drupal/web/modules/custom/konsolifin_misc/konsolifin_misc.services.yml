# konsolifin.services.yml
#
# Register services used by the konsolifin module.

services:

  # Replaces hook_menu_alter() — alters the user/password route.
  konsolifin.route_subscriber:
    class: Drupal\konsolifin_misc\EventSubscriber\RouteSubscriber
    tags:
      - { name: event_subscriber }

  konsolifin_misc.rss_feed:
    class: Drupal\konsolifin_misc\Service\RssFeedService
    arguments:
      - '@entity_type.manager'
      - '@path_alias.manager'
      - '@file_url_generator'
      - '@request_stack'
      - '@cache.default'
      - '@file_system'
