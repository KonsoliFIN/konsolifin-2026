id: konsolifin_nodes_page
label: Migrate basic page nodes from Drupal 7
migration_tags:
  - KonsoliFIN
migration_group: migrate_konsolifin
source:
  plugin: d7_node_complete
  node_type: page
process:
  nid:
    -
      plugin: get
      source: tnid
  vid:
    -
      plugin: get
      source: vid
  title:
    -
      plugin: get
      source: title
  uid:
    -
      plugin: get
      source: node_uid
  status:
    -
      plugin: get
      source: status
  created:
    -
      plugin: get
      source: created
  changed:
    -
      plugin: get
      source: timestamp
  promote:
    -
      plugin: get
      source: promote
  sticky:
    -
      plugin: get
      source: sticky
  revision_uid:
    -
      plugin: get
      source: revision_uid
  revision_log:
    -
      plugin: get
      source: log
  revision_timestamp:
    -
      plugin: get
      source: timestamp
  body:
    -
      plugin: sub_process
      source: body
      process:
        value:
          -
            plugin: media_wysiwyg_to_embed
            source: value
            media_migration:
              - konsolifin_media_images
              - konsolifin_media_video
        summary:
          plugin: get
          source: summary
        format:
          plugin: static_map
          source: format
          map:
            filtered_html: basic_html
          bypass: true
destination:
  plugin: 'entity_complete:node'
  translations: true
  default_bundle: page
