konsolifin.legacy_redirect_wplogin:
  path: '/wp-login.php'
  defaults:
    _controller: '\Drupal\konsolifin_misc\Controller\KonsolifinController::legacyRedirect'
  requirements:
    _access: 'TRUE'

konsolifin.legacy_forum_bbs:
  path: '/bbs'
